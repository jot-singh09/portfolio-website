<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>music player — karanjot singh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f1fe;
            --surface: #ffffff;
            --border: #e2dcf5;
            --text: #1e1a3e;
            --text-light: #6b5e8a;
            --accent: #7c4dff;
            --accent-soft: #ede7ff;
            --accent-glow: #9b7aff;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --player-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #121017;
            --surface: #1e1a2a;
            --border: #2e2a3e;
            --text: #f0ebff;
            --text-light: #9b8cb0;
            --accent: #b77cff;
            --accent-soft: #2a2340;
            --accent-glow: #9b7aff;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --player-bg: #1e1a2a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
            padding-bottom: 85px;
            transition: background 0.2s ease;
        }

        /* compact container */
        .app {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px 18px 24px;
        }

        /* header */
        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .back-link {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .greeting h1 {
            font-size: 26px;
            font-weight: 650;
            letter-spacing: -0.2px;
        }
        .greeting p {
            color: var(--text-light);
            font-size: 13px;
            margin-top: 2px;
        }

        /* mini stats */
        .stats-row {
            display: flex;
            gap: 10px;
            margin: 20px 0 18px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 8px;
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-light);
        }

        /* action buttons compact */
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            color: white;
        }
        .btn-primary:hover { background: var(--accent-glow); }
        .btn:hover { background: var(--accent-soft); }

        /* search */
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 44px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .search-box input {
            background: transparent;
            border: none;
            flex: 1;
            font-size: 14px;
            outline: none;
            color: var(--text);
        }
        .search-info {
            font-size: 11px;
            color: var(--text-light);
            margin-left: 12px;
            margin-bottom: 12px;
        }

        /* artists grid smaller */
        .section-title {
            display: flex;
            justify-content: space-between;
            margin: 18px 0 10px 4px;
        }
        .section-title h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .artists-simple {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .artist-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.15s;
        }
        .artist-item:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px);}
        .artist-avatar {
            width: 44px;
            height: 44px;
            background: var(--accent-soft);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-weight: 600;
            font-size: 18px;
            color: var(--accent);
        }
        .artist-name { font-size: 12px; font-weight: 500; }
        .artist-count { font-size: 10px; color: var(--text-light); }

        .folder-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 6px 14px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 12px;
        }

        /* song rows compact */
        .song-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
        }
        .song-row.active {
            border-left: 3px solid var(--accent);
            background: var(--accent-soft);
        }
        .song-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-soft);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 14px;
        }
        .song-info { flex: 1; }
        .song-title { font-weight: 500; font-size: 13px; }
        .song-artist { font-size: 11px; color: var(--text-light); margin-top: 2px; }
        .queue-add {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 28px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .queue-add.added { background: var(--accent); color: white; border-color: var(--accent); }

        /* ---------- COMPACT PLAYER BAR (small footprint) ---------- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 560px;
            margin: 0 auto;
            background: var(--player-bg);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(16px);
            background: var(--surface);
            z-index: 100;
            padding: 8px 14px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.05);
        }
        .player-compact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        .player-icon-small {
            width: 40px;
            height: 40px;
            background: var(--accent-soft);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }
        .player-track {
            flex: 1;
            overflow: hidden;
        }
        .player-track-name {
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-track-artist {
            font-size: 10px;
            color: var(--text-light);
        }
        .player-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .ctrl-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 34px;
            height: 34px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            font-size: 12px;
        }
        .ctrl-btn.play {
            background: var(--accent);
            border: none;
            color: white;
            width: 42px;
        }
        .jump-btn {
            width: 44px;
            font-size: 11px;
            gap: 3px;
        }
        .expand-btn {
            background: transparent;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-light);
            width: 32px;
        }

        /* ---------- MINI EXPANDED PLAYER (smaller, compact) ---------- */
        .player-expanded {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 560px;
            margin: 0 auto;
            background: var(--surface);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            border-top: 1px solid var(--border);
            padding: 16px 20px 20px;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            box-shadow: 0 -6px 24px rgba(0,0,0,0.1);
        }
        .player-expanded.open {
            transform: translateY(0);
        }
        .expanded-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .expanded-header h3 { font-size: 16px; font-weight: 600; }
        .expanded-art {
            text-align: center;
            margin-bottom: 12px;
        }
        .expanded-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-soft);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 24px;
            color: var(--accent);
        }
        .progress-section {
            margin: 12px 0;
        }
        .progress-bar {
            background: var(--border);
            height: 4px;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            background: var(--accent);
            width: 0%;
            height: 100%;
            border-radius: 4px;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .expanded-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 10px;
        }
        .expanded-jump-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 4px 0 8px;
        }
        .loop-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }
        .badge-loop {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .ctrl-btn.small {
            width: 32px;
            height: 32px;
            font-size: 12px;
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 400px;
            border-radius: 28px;
            padding: 18px;
            border: 1px solid var(--border);
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }
        .queue-list { overflow-y: auto; margin: 12px 0; }
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .empty-message {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
        }
        button { background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-row">
            <a href="project.html" class="back-link"><i class="fas fa-arrow-left"></i> Projects</a>
            <button class="theme-toggle" id="themeToggleBtn">🌙</button>
        </div>
        <div class="greeting">
            <h1>music player</h1>
            <p>karanjot singh · fresh sound</p>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="artistCount">0</div><div class="stat-label">artists</div></div>
            <div class="stat-card"><div class="stat-number" id="songCount">0</div><div class="stat-label">songs</div></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="shuffleBtn"><i class="fas fa-random"></i> Shuffle</button>
            <button class="btn" id="queueBtn"><i class="fas fa-list"></i> Queue <span id="queueCountBadge">0</span></button>
        </div>

        <div class="search-box">
            <i class="fas fa-search" style="color:var(--text-light); font-size:13px;"></i>
            <input type="text" id="searchInput" placeholder="Search songs or artists...">
            <i class="fas fa-times" id="clearSearchBtn" style="cursor:pointer; display:none; font-size:12px;"></i>
        </div>
        <div class="search-info" id="searchInfo"></div>

        <div class="section-title"><h2><i class="fas fa-microphone-alt"></i> Artists</h2><span id="artistTotalLabel"></span></div>
        <div id="artistsContainer" class="artists-simple"></div>

        <div id="folderBackBtn" style="display: none;" onclick="goBackToAll()"><div class="folder-back"><i class="fas fa-arrow-left"></i> Back to all</div></div>

        <div class="section-title"><h2><i class="fas fa-headphones"></i> <span id="songsHeader">Songs</span></h2><span id="songsTotalLabel"></span></div>
        <div id="songsContainer" class="songs-list"></div>
    </div>

    <!-- COMPACT BOTTOM BAR (slim controls + 10s) -->
    <div class="player-bar" id="playerBar">
        <div class="player-compact">
            <div class="player-info">
                <div class="player-icon-small"><i class="fas fa-music"></i></div>
                <div class="player-track">
                    <div class="player-track-name" id="miniSong">—</div>
                    <div class="player-track-artist" id="miniArtist">—</div>
                </div>
            </div>
            <div class="player-controls">
                <button class="ctrl-btn jump-btn" id="jumpBackCompact" title="back 10s"><i class="fas fa-rotate-left"></i> 10</button>
                <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                <button class="ctrl-btn play" id="playPauseBtn"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                <button class="ctrl-btn jump-btn" id="jumpForwardCompact" title="forward 10s"><i class="fas fa-rotate-right"></i> 10</button>
                <button class="expand-btn" id="expandBtn"><i class="fas fa-chevron-up"></i></button>
            </div>
        </div>
    </div>

    <!-- MINI EXPANDED (compact, less space) -->
    <div class="player-expanded" id="expandedPlayer">
        <div class="expanded-header"><h3>now playing</h3><button id="closeExpandedBtn"><i class="fas fa-chevron-down"></i></button></div>
        <div class="expanded-art"><div class="expanded-icon"><i class="fas fa-headphones"></i></div><div id="expandedSong" style="font-weight:500; font-size:15px;">—</div><div id="expandedArtist" style="font-size:12px; color:var(--text-light);">—</div></div>
        <div class="progress-section"><div class="progress-bar" id="progressBarBg"><div class="progress-fill" id="progressFill"></div></div><div class="time-row"><span id="currentTimeText">0:00</span><span id="durationText">0:00</span></div></div>
        <div class="expanded-jump-group">
            <button class="ctrl-btn small" id="expJumpBack"><i class="fas fa-rotate-left"></i> 10s</button>
            <button class="ctrl-btn small" id="expJumpForward"><i class="fas fa-rotate-right"></i> 10s</button>
        </div>
        <div class="expanded-actions">
            <button class="ctrl-btn small" id="expPrev"><i class="fas fa-backward-step"></i></button>
            <button class="ctrl-btn play" id="expPlayPause" style="width:48px;"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn small" id="expNext"><i class="fas fa-forward-step"></i></button>
        </div>
        <div class="loop-row"><div class="badge-loop"><button id="loopModeBtn" class="ctrl-btn small"><i class="fas fa-repeat"></i></button><span id="loopLabel" style="font-size:11px;">None</span></div><button id="muteBtn" class="ctrl-btn small"><i class="fas fa-volume-up"></i></button></div>
    </div>

    <!-- queue modal -->
    <div id="queueModal" class="modal"><div class="modal-content"><h3 style="font-size:18px;">Queue <span id="queueCountModal">0</span></h3><div id="queueListModal" class="queue-list"></div><div style="display:flex; gap:8px; margin-top:8px;"><button id="clearQueueModalBtn" class="btn" style="padding:8px;">Clear</button><button id="playQueueModalBtn" class="btn btn-primary" style="padding:8px;">Play</button><button id="addCurrentModalBtn" class="btn" style="padding:8px;">Add current</button></div></div></div>

    <script>
        // ---------- SAME MUSIC DATA ----------
        const musicData = {
        "Sidhu Moose Wala": ["The Ultimate Sidhu.mp3","295.mp3","8 Cylinder.mp3","008.mp3","Aroma.mp3","Attach.mp3","Bad song.mp3","BAMBIHA BOLE.mp3","Dark Love.mp3","Fk Em All.mp3","G Shit.mp3","Hathyar.mp3","I'm Better Now.mp3","LEGEND.mp3","LEVELS.mp3","LOCK.mp3","Mafia Style.mp3","NEAL.mp3","Panjab.mp3","Papi.mp3","Poison.mp3","Power.mp3","Racks And Rounds.mp3","SANJU.mp3","SATISFY.mp3","Sin.mp3","So High.mp3","Stefflon Don.mp3","STRAIGHT OUTTA.mp3","SYL.mp3","TAKE NOTES.mp3","These Days.mp3","Tochan.mp3","Todh Tere Yaar Da.mp3","UNFUCKWITHABLE.mp3","US.mp3","Vaar.mp3"],
                "Prem Dhillon": ["Prem Mix Playist.mp3","2 NUMBER.mp3", "26 Boulevard.mp3", "BADBERRY.mp3","BADBOY.mp3","Bootcut.mp3","Can't be us.mp3","DAMN DADDY.mp3","GET AT ME.mp3","SIT DOWN.mp3","TYPE SHII.mp3"],
                "Jaggix": ["Anthem.mp3","Ask Them.mp3","Even Flow.mp3","Fave value.mp3","Jxggi Dirty.mp3","Look Out.mp3","My Way.mp3","Never Ever.mp3","No Chance.mp3","Presidential.mp3","Reality Check.mp3","Strings Attached.mp3","That's All I Know.mp3","TNT.mp3","Uddna Sapp.mp3","Why me.mp3"],
                
                
                "Subh": ["Shubh.mp3","King Shit.mp3","Still Rollin.mp3"]    
        };
        let artists = [], songs = [];
        Object.keys(musicData).forEach(name => { artists.push({ name, songCount: musicData[name].length }); musicData[name].forEach(file => { songs.push({ id: songs.length+1, name: file.replace('.mp3',''), artist: name, url: `./${name}/${file}` }); }); });
        
        let currentPlaylist = [...songs];
        let currentIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let searchTerm = '';
        let queue = [];
        let isPlayingFromQueue = false;
        let queueCursor = -1;
        let loopMode = 'none';
        let isMuted = false;
        let previousVolume = 0.7;
        audio.volume = previousVolume;
        let currentArtistFilter = null;

        function formatTime(sec) { if(isNaN(sec)) return '0:00'; const m = Math.floor(sec/60); const s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function updateMetaUI(song) { 
            document.getElementById('miniSong').innerText = song.name; 
            document.getElementById('miniArtist').innerText = song.artist; 
            document.getElementById('expandedSong').innerText = song.name; 
            document.getElementById('expandedArtist').innerText = song.artist; 
        }
        function updateStats() { document.getElementById('artistCount').innerText = artists.length; document.getElementById('songCount').innerText = songs.length; document.getElementById('artistTotalLabel').innerHTML = artists.length + ' artists'; }
        function renderArtists() { 
            document.getElementById('artistsContainer').innerHTML = artists.map(a => `<div class="artist-item" onclick="filterByArtist('${a.name}')"><div class="artist-avatar">${a.name.charAt(0)}</div><div class="artist-name">${escapeHtml(a.name)}</div><div class="artist-count">${a.songCount}</div></div>`).join(''); 
        }
        function filterByArtist(name) { currentArtistFilter = name; const filtered = songs.filter(s => s.artist === name); document.getElementById('folderBackBtn').style.display = 'block'; displaySongs(filtered, name); }
        function goBackToAll() { currentArtistFilter = null; document.getElementById('folderBackBtn').style.display = 'none'; displaySongs(songs, 'All Songs'); }
        function displaySongs(list, title) { 
            document.getElementById('songsHeader').innerText = title; 
            document.getElementById('songsTotalLabel').innerText = list.length + ' songs'; 
            const container = document.getElementById('songsContainer'); 
            if(!list.length){ container.innerHTML='<div class="empty-message">✨ No songs</div>'; return; } 
            container.innerHTML = list.map((song, idx) => `<div class="song-row ${currentPlaylist[currentIndex]?.id === song.id ? 'active' : ''}" onclick="playSelected(${idx})"><div class="song-icon"><i class="fas fa-music"></i></div><div class="song-info"><div class="song-title">${escapeHtml(song.name)}</div><div class="song-artist">${escapeHtml(song.artist)}</div></div><div class="queue-add" onclick="event.stopPropagation(); addToQueueFromId(${song.id})"><i class="fas fa-plus"></i></div></div>`).join(''); 
            currentPlaylist = list; 
        }
        function playSelected(idx) { 
            if(!currentPlaylist.length) return; 
            currentIndex = idx; 
            const song = currentPlaylist[idx]; 
            updateMetaUI(song); 
            audio.src = song.url; 
            audio.load(); 
            audio.play().catch(e=>console.log); 
            isPlaying = true; 
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>'; 
            document.getElementById('expPlayPause').innerHTML = '<i class="fas fa-pause"></i>'; 
            displaySongs(currentPlaylist, document.getElementById('songsHeader').innerText); 
            updateQueueModalList(); 
        }
        function togglePlay() { 
            if(currentIndex === -1 && currentPlaylist.length) playSelected(0); 
            else if(isPlaying) { audio.pause(); document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>'; document.getElementById('expPlayPause').innerHTML = '<i class="fas fa-play"></i>'; } 
            else { audio.play(); document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>'; document.getElementById('expPlayPause').innerHTML = '<i class="fas fa-pause"></i>'; } 
            isPlaying = !isPlaying; 
        }
        function nextTrack() { 
            if(isPlayingFromQueue && queue.length) { playNextInQueue(); return; } 
            if(currentPlaylist.length && currentIndex !== -1) { let next = (currentIndex+1) % currentPlaylist.length; playSelected(next); } 
        }
        function prevTrack() { 
            if(isPlayingFromQueue && queueCursor > 0 && queue.length) { queueCursor--; playSelected(queueCursor); return; } 
            if(currentPlaylist.length && currentIndex !== -1) { let prev = (currentIndex-1+currentPlaylist.length)%currentPlaylist.length; playSelected(prev); } 
        }
        function jumpBackward() { if(currentIndex !== -1 && audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 10); }
        function jumpForward() { if(currentIndex !== -1 && audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }
        function shuffleAll() { if(songs.length){ const rand = Math.floor(Math.random()*songs.length); currentPlaylist = [...songs]; isPlayingFromQueue=false; playSelected(rand); goBackToAll(); } }
        function addToQueueFromId(id) { const song = songs.find(s=>s.id===id); if(song){ queue.push(song); updateQueueUI(); const btn = event.currentTarget; if(btn){ btn.classList.add('added'); btn.innerHTML='<i class="fas fa-check"></i>'; setTimeout(()=>{ btn.classList.remove('added'); btn.innerHTML='<i class="fas fa-plus"></i>'; },300); } } }
        function addCurrentToQueue() { if(currentIndex !== -1){ queue.push(currentPlaylist[currentIndex]); updateQueueUI(); } }
        function clearQueue() { queue = []; isPlayingFromQueue=false; queueCursor=-1; updateQueueUI(); }
        function playQueue() { if(queue.length){ isPlayingFromQueue=true; queueCursor=0; currentPlaylist = queue; playSelected(0); updateQueueUI(); } }
        function playNextInQueue() { if(queue.length && queueCursor < queue.length-1){ queueCursor++; playSelected(queueCursor); return true; } return false; }
        function removeFromQueue(idx) { 
            if(isPlayingFromQueue && idx === queueCursor){ if(queue.length>1){ queueCursor = Math.max(0, idx-1); } else { isPlayingFromQueue=false; queueCursor=-1; } } 
            else if(isPlayingFromQueue && idx < queueCursor) queueCursor--; 
            queue.splice(idx,1); updateQueueUI(); 
        }
        function updateQueueUI() { 
            const count = queue.length; 
            document.getElementById('queueCountBadge').innerText = count; 
            document.getElementById('queueCountModal').innerText = count; 
            const modalList = document.getElementById('queueListModal'); 
            if(!count) modalList.innerHTML = '<div class="empty-message">Queue empty</div>'; 
            else modalList.innerHTML = queue.map((s,i)=>`<div class="queue-item"><div><strong>${escapeHtml(s.name)}</strong><div style="font-size:10px">${escapeHtml(s.artist)}</div></div><button onclick="removeFromQueue(${i})"><i class="fas fa-trash-alt"></i></button></div>`).join(''); 
        }
        function updateQueueModalList() { updateQueueUI(); }
        function handleSongEnd() { 
            if(loopMode === 'one') { audio.currentTime = 0; audio.play(); } 
            else if(loopMode === 'random') { if(currentPlaylist.length){ const rand = Math.floor(Math.random()*currentPlaylist.length); playSelected(rand); } } 
            else if(isPlayingFromQueue) { if(!playNextInQueue()) { isPlayingFromQueue=false; queueCursor=-1; currentPlaylist = songs; if(loopMode === 'all') nextTrack(); } } 
            else if(loopMode === 'all') { nextTrack(); } 
            else if(currentIndex < currentPlaylist.length-1) nextTrack(); 
            else { isPlaying=false; document.getElementById('playPauseBtn').innerHTML='<i class="fas fa-play"></i>'; document.getElementById('expPlayPause').innerHTML='<i class="fas fa-play"></i>'; } 
        }
        function cycleLoop() { const modes = [{mode:'none',icon:'fa-repeat',label:'None'},{mode:'one',icon:'fa-repeat-1',label:'One'},{mode:'all',icon:'fa-repeat',label:'All'},{mode:'random',icon:'fa-random',label:'Random'}]; let idx = modes.findIndex(m=>m.mode===loopMode); let next = modes[(idx+1)%modes.length]; loopMode = next.mode; document.getElementById('loopModeBtn').innerHTML = `<i class="fas ${next.icon}"></i>`; document.getElementById('loopLabel').innerText = next.label; }
        function toggleMute() { isMuted = !isMuted; if(isMuted) { previousVolume = audio.volume; audio.volume = 0; } else { audio.volume = previousVolume || 0.7; } const icon = document.getElementById('muteBtn'); icon.innerHTML = audio.volume===0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; }
        function updateProgress() { if(!isNaN(audio.duration) && audio.duration) { const percent = (audio.currentTime/audio.duration)*100; document.getElementById('progressFill').style.width = percent+'%'; document.getElementById('currentTimeText').innerText = formatTime(audio.currentTime); document.getElementById('durationText').innerText = formatTime(audio.duration); } }
        function setupProgressSeek() { const bar = document.getElementById('progressBarBg'); bar.addEventListener('click', (e) => { if(currentIndex !== -1 && audio.duration){ const rect = bar.getBoundingClientRect(); let percent = (e.clientX - rect.left)/rect.width; percent = Math.min(1, Math.max(0, percent)); audio.currentTime = percent * audio.duration; } }); }
        function filterSongs() { if(!searchTerm) { if(currentArtistFilter) filterByArtist(currentArtistFilter); else displaySongs(songs, 'All Songs'); document.getElementById('searchInfo').innerText = ''; return; } const filtered = songs.filter(s=>s.name.toLowerCase().includes(searchTerm)||s.artist.toLowerCase().includes(searchTerm)); displaySongs(filtered, 'Search'); document.getElementById('searchInfo').innerText = `${filtered.length} result(s)`; }
        function clearSearch() { document.getElementById('searchInput').value = ''; searchTerm = ''; document.getElementById('clearSearchBtn').style.display = 'none'; filterSongs(); }
        function toggleExpanded() { document.getElementById('expandedPlayer').classList.toggle('open'); }
        function closeExpanded() { document.getElementById('expandedPlayer').classList.remove('open'); }
        function openQueueModal() { document.getElementById('queueModal').classList.add('open'); updateQueueUI(); }
        function closeQueueModal() { document.getElementById('queueModal').classList.remove('open'); }

        // bindings
        document.getElementById('shuffleBtn').onclick = shuffleAll;
        document.getElementById('queueBtn').onclick = openQueueModal;
        document.getElementById('playPauseBtn').onclick = togglePlay;
        document.getElementById('expPlayPause').onclick = togglePlay;
        document.getElementById('prevBtn').onclick = prevTrack;
        document.getElementById('nextBtn').onclick = nextTrack;
        document.getElementById('expPrev').onclick = prevTrack;
        document.getElementById('expNext').onclick = nextTrack;
        document.getElementById('loopModeBtn').onclick = cycleLoop;
        document.getElementById('muteBtn').onclick = toggleMute;
        document.getElementById('expandBtn').onclick = toggleExpanded;
        document.getElementById('closeExpandedBtn').onclick = closeExpanded;
        document.getElementById('clearQueueModalBtn').onclick = clearQueue;
        document.getElementById('playQueueModalBtn').onclick = playQueue;
        document.getElementById('addCurrentModalBtn').onclick = addCurrentToQueue;
        document.getElementById('jumpBackCompact').onclick = jumpBackward;
        document.getElementById('jumpForwardCompact').onclick = jumpForward;
        document.getElementById('expJumpBack').onclick = jumpBackward;
        document.getElementById('expJumpForward').onclick = jumpForward;
        document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); document.getElementById('clearSearchBtn').style.display = searchTerm ? 'block' : 'none'; filterSongs(); });
        document.getElementById('clearSearchBtn').onclick = clearSearch;
        document.getElementById('themeToggleBtn').onclick = () => { const cur = document.body.getAttribute('data-theme'); const next = cur === 'dark' ? 'light' : 'dark'; document.body.setAttribute('data-theme', next); document.getElementById('themeToggleBtn').innerText = next === 'dark' ? '🌙' : '☀️'; };
        document.getElementById('queueModal').addEventListener('click', (e) => { if(e.target === document.getElementById('queueModal')) closeQueueModal(); });
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', handleSongEnd);
        audio.addEventListener('loadedmetadata', () => { document.getElementById('durationText').innerText = formatTime(audio.duration); });
        window.filterByArtist = filterByArtist;
        window.goBackToAll = goBackToAll;
        window.playSelected = playSelected;
        window.addToQueueFromId = addToQueueFromId;
        window.removeFromQueue = removeFromQueue;
        
        renderArtists();
        updateStats();
        displaySongs(songs, 'All Songs');
        setupProgressSeek();
        updateQueueUI();
        document.body.setAttribute('data-theme', 'light');
    </script>
</body>
</html>
