<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎵 Music Player - Karanjot Singh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-primary: #a855f7;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #a855f7, #8b5cf6);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --surface-light: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f6f8fa;
            --text-primary: #1f2328;
            --text-secondary: #57606a;
            --text-muted: #6e7781;
            --accent-primary: #7c3aed;
            --accent-secondary: #6d28d9;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #6d28d9);
            --card-bg: rgba(0, 0, 0, 0.02);
            --card-border: rgba(0, 0, 0, 0.1);
            --surface-light: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.3s ease, padding-bottom 0.3s;
            padding-bottom: 0;
        }

        body.with-player-full { padding-bottom: 380px; }
        body.with-player-compact { padding-bottom: 100px; }

        /* Starfield & Orbs */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
            pointer-events: none;
        }
        .orb-1 { width: 300px; height: 300px; background: var(--accent-primary); top: 10%; left: 10%; }
        .orb-2 { width: 250px; height: 250px; background: var(--accent-secondary); bottom: 20%; right: 10%; animation-delay: 5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 33% { transform: translate(50px, -50px); } 66% { transform: translate(-30px, 30px); } }

        /* Header Bar - replaces nav */
        .header-bar {
            position: fixed;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 8px 16px;
        }
        .back-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .back-btn i { font-size: 14px; }
        .back-btn:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(168,85,247,0.3); }
        .back-btn:active { transform: scale(0.98); }
        .theme-toggle-header {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }
        .theme-toggle-header:hover { background: var(--surface-light); transform: rotate(15deg); }

        .container {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
            padding: 100px 24px 60px;
            z-index: 1;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .header h1 {
            font-size: 36px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .header p a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-label { color: var(--text-secondary); font-size: 12px; margin-bottom: 8px; }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.4s;
        }
        .control-btn {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn.primary { background: var(--accent-gradient); border: none; color: white; }
        .control-btn:active { transform: scale(0.98); }

        .search-container {
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            width: 100%;
            outline: none;
        }
        .search-results-count {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 8px;
            margin-left: 16px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 16px;
        }
        .section-title h2 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .artist-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .artist-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); }
        .artist-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-gradient);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        .artist-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .artist-count { color: var(--text-secondary); font-size: 12px; }

        .folder-path {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: 30px;
            margin-bottom: 16px;
            border: 1px solid var(--card-border);
            cursor: pointer;
        }
        .song-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
        }
        .song-item.active {
            border: 2px solid var(--accent-primary);
            background: linear-gradient(90deg, var(--card-bg), rgba(168, 85, 247, 0.1));
        }
        .song-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .song-info { flex: 1; }
        .song-name { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
        .song-meta { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 12px; }
        .queue-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .queue-btn.added { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--card-border);
        }

        /* Player Components */
        .player, .player-compact {
            position: fixed;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--card-border);
            transition: bottom 0.3s ease;
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .player { bottom: -380px; border-radius: 30px 30px 0 0; padding: 20px; }
        .player.active { bottom: 0; }
        .player-compact { bottom: -100px; border-radius: 30px 30px 0 0; padding: 12px 20px; }
        .player-compact.active { bottom: 0; }
        .compact-content { display: flex; align-items: center; justify-content: space-between; }
        .compact-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compact-play-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }
        .player-info { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .player-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .progress-container { margin-bottom: 20px; }
        .progress { display: flex; align-items: center; gap: 8px; }
        .time { color: var(--text-secondary); font-size: 12px; min-width: 45px; }
        .progress-bar-wrapper {
            position: relative;
            flex: 1;
            height: 30px;
            cursor: pointer;
            touch-action: none;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--card-border);
            border-radius: 10px;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 10px;
            width: 0%;
        }
        .progress-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border: 3px solid var(--accent-primary);
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%;
            cursor: grab;
            z-index: 30;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .time-tooltip {
            position: absolute;
            top: -30px;
            background: var(--accent-primary);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            transform: translateX(-50%);
            display: none;
            white-space: nowrap;
            pointer-events: none;
        }
        .progress-bar-wrapper:hover .time-tooltip { display: block; }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .player-controls button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
        }
        .play-btn {
            background: var(--accent-gradient) !important;
            width: 64px !important;
            height: 64px !important;
            font-size: 28px !important;
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }
        .jump-btn {
            background: var(--card-bg) !important;
            border: 1px solid var(--card-border) !important;
            font-size: 14px !important;
        }

        .loop-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-light);
            border-radius: 40px;
            padding: 8px 16px;
            border: 1px solid var(--card-border);
        }
        .loop-group { display: flex; gap: 12px; align-items: center; }
        .loop-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        .loop-btn.active { background: var(--accent-gradient); color: white; border: none; }
        .loop-text { font-size: 13px; color: var(--text-secondary); }
        .volume-btn, .hide-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Queue Modal */
        .queue-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .queue-modal.open { display: flex; }
        .queue-window {
            background: var(--bg-secondary);
            border: 2px solid var(--accent-primary);
            border-radius: 40px;
            width: 100%;
            max-width: 440px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }
        .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .queue-controls-top {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 16px;
        }
        .queue-controls-top button {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .queue-list {
            flex: 1;
            overflow-y: auto;
            gap: 8px;
            display: flex;
            flex-direction: column;
            max-height: 350px;
        }
        .queue-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--card-border);
        }
        .queue-item.playing { border: 2px solid var(--accent-primary); }
        .queue-item-remove {
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 480px) {
            .container { padding: 90px 16px 60px; }
            .header-bar { left: 12px; right: 12px; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="starfield" id="starfield"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Header Bar: Back Button + Theme Toggle (no nav) -->
    <div class="header-bar">
        <a href="https://programmingwithkaran.netlify.app/" class="back-btn" id="backToProjectsBtn">
            <i class="fas fa-arrow-left"></i> Our Website
        </a>
        <button class="theme-toggle-header" id="themeHeaderBtn">🌙</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎵 Music Library</h1>
            <p>Made by Karanjot Singh | <a href="https://github.com/jot-singh09" target="_blank">GitHub</a></p>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-label">Artists</div><div class="stat-value" id="artistCount">0</div></div>
            <div class="stat-card"><div class="stat-label">Songs</div><div class="stat-value" id="songCount">0</div></div>
        </div>
        <div class="controls">
            <button class="control-btn primary" onclick="shuffleAllSongs()"><i class="fas fa-random"></i> Shuffle All</button>
            <button class="control-btn" onclick="openQueueModal()"><i class="fas fa-list"></i> Queue (<span id="queueCount">0</span>)</button>
        </div>
        <div class="search-container">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search songs or artists..."><i class="fas fa-times" id="clearSearch" style="cursor:pointer; display:none;" onclick="clearSearch()"></i></div>
            <div class="search-results-count" id="searchResultsCount"></div>
        </div>
        <div class="section-title"><h2><i class="fas fa-users"></i> Artists</h2><span id="artistTotal"></span></div>
        <div class="artists-grid" id="artistsGrid"></div>
        <div id="folderPath" style="display:none;" onclick="goBack()"><div class="folder-path"><i class="fas fa-arrow-left"></i><span>Back</span><span id="currentFolder" style="color:var(--accent-primary); margin-left:8px;"></span></div></div>
        <div class="section-title"><h2 id="songsTitle"><i class="fas fa-music"></i> All Songs</h2><span id="songTotal"></span></div>
        <div id="songsContainer"></div>
    </div>

    <!-- Queue Modal -->
    <div class="queue-modal" id="queueModal"><div class="queue-window"><div class="queue-header"><h3><i class="fas fa-list"></i> Play Queue</h3><button class="queue-close" onclick="closeQueueModal()"><i class="fas fa-times"></i></button></div><div class="queue-controls-top"><button onclick="playQueue()" id="playQueueBtn" disabled><i class="fas fa-play"></i> Play</button><button onclick="addCurrentToQueue()" id="addCurrentBtn" disabled><i class="fas fa-plus"></i> Current</button><button class="primary" onclick="clearQueue()" id="clearQueueBtn" disabled><i class="fas fa-trash"></i> Clear</button></div><div class="queue-list" id="queueList"><div class="empty-state"><i class="fas fa-music"></i><p>Queue empty</p></div></div></div></div>

    <!-- Full Player -->
    <div class="player" id="player"><div class="player-info"><div class="player-icon"><i class="fas fa-music"></i></div><div><h4 id="currentSong">Select a song</h4><p id="currentArtist">-</p></div></div>
        <div class="progress-container"><div class="progress"><span class="time" id="currentTime">0:00</span><div class="progress-bar-wrapper" id="progressBarWrapper"><div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div><div class="progress-handle" id="progressHandle"></div><div class="time-tooltip" id="timeTooltip">0:00</div></div><span class="time" id="totalTime">0:00</span></div></div>
        <div class="player-controls"><button class="jump-btn" onclick="jumpBackward()"><i class="fas fa-rotate-left"></i> 10</button><button onclick="playPrevious()"><i class="fas fa-backward-step"></i></button><button class="play-btn" onclick="togglePlay()"><i class="fas fa-play" id="playIcon"></i></button><button onclick="playNext()"><i class="fas fa-forward-step"></i></button><button class="jump-btn" onclick="jumpForward()"><i class="fas fa-rotate-right"></i> 10</button></div>
        <div class="loop-controls-row"><div class="loop-group"><button class="loop-btn" onclick="cycleLoopMode()" id="loopBtn"><i class="fas fa-repeat" id="loopIcon"></i></button><div class="loop-text">Loop: <span id="loopModeText">None</span></div></div><div style="display:flex; gap:8px;"><button class="volume-btn" onclick="toggleMute()" id="muteBtn"><i class="fas fa-volume-high" id="volumeIcon"></i></button><button class="hide-btn" onclick="togglePlayerMode()"><i class="fas fa-chevron-down"></i></button></div></div>
    </div>
    <!-- Compact Player -->
    <div class="player-compact" id="playerCompact"><div class="compact-content"><div class="song-info-compact"><div class="compact-icon"><i class="fas fa-music"></i></div><div><div class="compact-name" id="compactSongName">Select a song</div><div class="compact-artist" id="compactArtistName">-</div></div></div><div class="compact-controls"><button class="compact-play-btn" onclick="togglePlay()"><i class="fas fa-play" id="compactPlayIcon"></i></button><button class="compact-show-btn" onclick="togglePlayerMode()"><i class="fas fa-chevron-up"></i></button></div></div></div>

    <script>
        // Music Data
        const musicData = {
            "Sidhu Moose Wala": ["The Ultimate Sidhu.mp3","295.mp3","8 Cylinder.mp3","008.mp3","Aroma.mp3","Attach.mp3","Dark Love.mp3","LEGEND.mp3","LEVELS.mp3","So High.mp3","SYL.mp3"],
            "Prem Dhillon": ["2 NUMBER.mp3","BADBERRY.mp3","Bootcut.mp3","SIT DOWN.mp3"],
            "Jaggix": ["Anthem.mp3","My Way.mp3","No Chance.mp3","TNT.mp3"],
            "Subh": ["King Shit.mp3","Still Rollin.mp3"]
        };
        let artists = [], songs = [];
        Object.keys(musicData).forEach((name, idx) => { artists.push({ name, songCount: musicData[name].length, id: idx+1 }); musicData[name].forEach(file => { songs.push({ id: songs.length+1, name: file.replace('.mp3',''), artist: name, url: `./${name}/${file}`, file }); }); });

        function setupDrag() { const handle = document.getElementById('progressHandle'); const wrapper = document.getElementById('progressBarWrapper'); const onMove = (e) => { if(isDragging){ const rect = wrapper.getBoundingClientRect(); let percent = (e.clientX - rect.left)/rect.width; percent = Math.min(1, Math.max(0, percent)); document.getElementById('progressFill').style.width = (percent*100)+'%'; handle.style.left = (percent*100)+'%'; document.getElementById('timeTooltip').innerText = formatTime(percent*audio.duration); document.getElementById('timeTooltip').style.left = (percent*100)+'%'; } }; const onUp = (e) => { if(isDragging){ const rect = wrapper.getBoundingClientRect(); let percent = (e.clientX - rect.left)/rect.width; percent = Math.min(1, Math.max(0, percent)); if(currentIndex !== -1) audio.currentTime = percent * audio.duration; isDragging = false; handle.classList.remove('dragging'); document.getElementById('timeTooltip').style.display = 'none'; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); } }; handle.addEventListener('mousedown', (e) => { e.preventDefault(); if(currentIndex === -1) return; isDragging = true; handle.classList.add('dragging'); document.getElementById('timeTooltip').style.display = 'block'; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); }); wrapper.addEventListener('click', (e) => { if(currentIndex !== -1 && !isDragging){ const rect = wrapper.getBoundingClientRect(); let percent = (e.clientX - rect.left)/rect.width; percent = Math.min(1, Math.max(0, percent)); audio.currentTime = percent * audio.duration; } }); }
